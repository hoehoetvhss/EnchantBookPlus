name: Gradle Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Get release version from tag
        run: |
          TAG=${{ github.event.release.tag_name }}
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
        id: version

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and package
        run: ./gradlew -Pversion=${{ steps.version.outputs.VERSION }} clean build

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/EnchantBookPlus-${{ steps.version.outputs.VERSION }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Modrinth
        uses: cloudnode-pro/modrinth-publish@v2
        with:
          token: '${{ secrets.MODRINTH_TOKEN }}'
          project: '${{ github.event.repository.custom_properties.modrinth_id }}'
          name: ${{ github.event.release.name == github.event.release.tag_name && format('EnchantBookPlus {0}', steps.version.outputs.VERSION) || github.event.release.name }}
          version: ${{ steps.version.outputs.VERSION }}
          changelog: ${{ github.event.release.body }}
          loaders: |-
            paper
            spigot
            bukkit
          game-versions: |-
            1.17.x
            1.18.x
            1.19.x
            1.20.x
            1.21.x
            26.x
          files: build/libs/EnchantBookPlus-${{ steps.version.outputs.VERSION }}.jar
          dependencies: '[{"project_id":"N4CZEMrg","dependency_type":"optional"}]'

